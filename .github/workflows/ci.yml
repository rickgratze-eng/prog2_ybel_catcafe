name: GitHub CI

on:
    push:
        branches: [ master, main ]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25

            - run: chmod +x gradlew
            - run: ./gradlew compileJava

    test:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25

            - run: chmod +x gradlew
            - run: ./gradlew test

    formatting:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25

            - run: chmod +x gradlew
            - run: ./gradlew spotlessCheck
